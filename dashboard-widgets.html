<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дашборд Виджетов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --bg-widget: #fafafa;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --border-color: #e0e0e0;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --error: #ef4444;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        html[data-theme="dark"] {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2d2d2d;
            --bg-widget: #262626;
            --text-primary: #f0f0f0;
            --text-secondary: #b0b0b0;
            --border-color: #404040;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s ease, color 0.3s ease;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            background-color: var(--bg-secondary);
            padding: 8px 14px;
            border-radius: 50px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            background-color: var(--border-color);
        }

        .theme-toggle-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--text-primary);
            transition: transform 0.3s ease;
        }

        .theme-toggle-btn:hover {
            transform: rotate(20deg);
        }

        .widgets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .widget {
            background-color: var(--bg-widget);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .widget:hover {
            box-shadow: var(--shadow-lg);
            border-color: var(--accent);
        }

        .widget-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .widget-title-icon {
            font-size: 1.8rem;
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background-color: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 0.85rem;
        }

        .btn-danger {
            background-color: var(--error);
            color: white;
        }

        .btn-danger:hover {
            background-color: #dc2626;
        }

        .btn-success {
            background-color: var(--success);
            color: white;
        }

        .btn-success:hover {
            background-color: #059669;
        }

        /* Weather Widget */
        .weather-info {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
            padding: 16px;
            background-color: var(--bg-primary);
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .weather-icon {
            font-size: 3rem;
        }

        .weather-details {
            flex: 1;
        }

        .weather-temp {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent);
        }

        .weather-description {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .weather-city {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .weather-error {
            color: var(--error);
            padding: 12px;
            background-color: rgba(239, 68, 68, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(239, 68, 68, 0.3);
            margin-top: 16px;
        }

        .weather-loading {
            color: var(--text-secondary);
            font-style: italic;
        }

        /* Todo Widget */
        .todo-list {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        .todo-item:hover {
            background-color: var(--bg-secondary);
            border-color: var(--accent);
        }

        .todo-item.completed {
            opacity: 0.6;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: var(--text-secondary);
        }

        .todo-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--success);
        }

        .todo-text {
            flex: 1;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .todo-delete-btn {
            background-color: transparent;
            color: var(--error);
            padding: 6px 8px;
            font-size: 0.85rem;
            border: 1px solid var(--error);
            border-radius: 4px;
        }

        .todo-delete-btn:hover {
            background-color: var(--error);
            color: white;
        }

        .todo-empty {
            text-align: center;
            color: var(--text-secondary);
            padding: 20px;
            font-style: italic;
        }

        /* Quote Widget */
        .quote-container {
            margin-top: 20px;
            padding: 20px;
            background-color: var(--bg-primary);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--accent);
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .quote-text {
            font-size: 1.1rem;
            font-style: italic;
            color: var(--text-primary);
            margin-bottom: 14px;
            line-height: 1.6;
        }

        .quote-author {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-align: right;
        }

        .quote-loading {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .quote-error {
            color: var(--error);
            text-align: center;
        }

        /* Scrollbar Styling */
        .todo-list::-webkit-scrollbar {
            width: 6px;
        }

        .todo-list::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        .todo-list::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 3px;
        }

        .todo-list::-webkit-scrollbar-thumb:hover {
            background: var(--accent-hover);
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .todo-item {
            animation: fadeIn 0.3s ease;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.5rem;
            }

            .widgets-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .widget {
                padding: 16px;
            }

            .weather-info {
                flex-direction: column;
                text-align: center;
                gap: 12px;
            }

            .weather-icon {
                font-size: 2.5rem;
            }

            .input-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 12px;
            }

            .header {
                margin-bottom: 24px;
            }

            .header h1 {
                font-size: 1.2rem;
            }

            .widget-title {
                font-size: 1.2rem;
            }

            .weather-temp {
                font-size: 1.5rem;
            }

            .quote-text {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Дашборд Виджетов</h1>
            <div class="theme-toggle">
                <button class="theme-toggle-btn" id="themeBtn" title="Переключить тему">🌙</button>
            </div>
        </div>

        <div class="widgets-grid">
            <!-- Weather Widget -->
            <div class="widget">
                <div class="widget-title">
                    <span class="widget-title-icon">🌤️</span>
                    Погода
                </div>
                <div class="input-group">
                    <input type="text" id="cityInput" placeholder="Введите название города..." />
                    <button class="btn-primary" id="weatherBtn">Узнать</button>
                </div>
                <div id="weatherContainer"></div>
            </div>

            <!-- Todo Widget -->
            <div class="widget">
                <div class="widget-title">
                    <span class="widget-title-icon">✅</span>
                    Список дел
                </div>
                <div class="input-group">
                    <input type="text" id="todoInput" placeholder="Добавьте новую задачу..." />
                    <button class="btn-primary" id="addTodoBtn">Добавить</button>
                </div>
                <ul class="todo-list" id="todoList"></ul>
            </div>

            <!-- Quote Widget -->
            <div class="widget">
                <div class="widget-title">
                    <span class="widget-title-icon">💬</span>
                    Цитата дня
                </div>
                <div id="quoteContainer"></div>
                <button class="btn-primary" id="newQuoteBtn" style="width: 100%; margin-top: 16px;">Обновить</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== THEME MANAGEMENT ====================
        const themeBtn = document.getElementById('themeBtn');
        const html = document.documentElement;

        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            setTheme(savedTheme);
        }

        function setTheme(theme) {
            html.setAttribute('data-theme', theme);
            themeBtn.textContent = theme === 'dark' ? '☀️' : '🌙';
            localStorage.setItem('theme', theme);
        }

        themeBtn.addEventListener('click', () => {
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            setTheme(newTheme);
        });

        // ==================== WEATHER WIDGET ====================
        const cityInput = document.getElementById('cityInput');
        const weatherBtn = document.getElementById('weatherBtn');
        const weatherContainer = document.getElementById('weatherContainer');
        const WEATHER_API_KEY = '8fceacedc209cbffd2fa6c5fc2ca3822';

        const weatherIcons = {
            'Clear': '☀️',
            'Clouds': '☁️',
            'Rain': '🌧️',
            'Drizzle': '🌦️',
            'Thunderstorm': '⛈️',
            'Snow': '❄️',
            'Mist': '🌫️',
            'Smoke': '💨',
            'Haze': '🌫️',
            'Dust': '🌪️',
            'Fog': '🌫️',
            'Sand': '🏜️',
            'Ash': '🌋',
            'Squall': '💨',
            'Tornado': '🌪️'
        };

        function displayWeather(data) {
            const temp = Math.round(data.main.temp);
            const description = data.weather[0].main;
            const icon = weatherIcons[description] || '🌡️';
            const city = data.name;
            const country = data.sys.country;

            weatherContainer.innerHTML = `
                <div class="weather-info">
                    <div class="weather-icon">${icon}</div>
                    <div class="weather-details">
                        <div class="weather-temp">${temp}°C</div>
                        <div class="weather-description">${description}</div>
                        <div class="weather-city">${city}, ${country}</div>
                    </div>
                </div>
            `;

            localStorage.setItem('lastCity', city);
            cityInput.value = city;
        }

        function displayWeatherError(message) {
            weatherContainer.innerHTML = `<div class="weather-error">${message}</div>`;
        }

        function displayWeatherLoading() {
            weatherContainer.innerHTML = `<div class="weather-loading">Загрузка...</div>`;
        }

        async function getWeather() {
            if (!WEATHER_API_KEY) {
                displayWeatherError('❌ API ключ не указан. Пожалуйста, добавьте ключ OpenWeatherMap в код.');
                return;
            }

            const city = cityInput.value.trim();
            if (!city) {
                displayWeatherError('❌ Пожалуйста, введите название города.');
                return;
            }

            displayWeatherLoading();

            try {
                const response = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&units=metric&lang=ru&appid=${WEATHER_API_KEY}`
                );

                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error('Город не найден. Пожалуйста, проверьте название.');
                    } else {
                        throw new Error('Ошибка при получении данных о погоде.');
                    }
                }

                const data = await response.json();
                displayWeather(data);
            } catch (error) {
                displayWeatherError(`❌ ${error.message}`);
            }
        }

        weatherBtn.addEventListener('click', getWeather);
        cityInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') getWeather();
        });

        // Load last city
        const lastCity = localStorage.getItem('lastCity');
        if (lastCity) {
            cityInput.value = lastCity;
        }

        // ==================== TODO WIDGET ====================
        const todoInput = document.getElementById('todoInput');
        const addTodoBtn = document.getElementById('addTodoBtn');
        const todoList = document.getElementById('todoList');

        function saveTodos() {
            const todos = Array.from(todoList.querySelectorAll('.todo-item')).map(item => ({
                id: item.dataset.id,
                text: item.querySelector('.todo-text').textContent,
                completed: item.querySelector('.todo-checkbox').checked
            }));
            localStorage.setItem('todos', JSON.stringify(todos));
        }

        function loadTodos() {
            const saved = localStorage.getItem('todos');
            if (saved) {
                const todos = JSON.parse(saved);
                todos.forEach(todo => addTodoToList(todo.text, todo.completed, todo.id));
            }
        }

        function addTodoToList(text, completed = false, id = null) {
            if (!id) {
                id = Date.now().toString();
            }

            const li = document.createElement('li');
            li.className = 'todo-item';
            if (completed) li.classList.add('completed');
            li.dataset.id = id;

            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.className = 'todo-checkbox';
            checkbox.checked = completed;
            checkbox.addEventListener('change', () => {
                li.classList.toggle('completed');
                saveTodos();
            });

            const span = document.createElement('span');
            span.className = 'todo-text';
            span.textContent = text;

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'btn-danger btn-small';
            deleteBtn.textContent = 'Удалить';
            deleteBtn.addEventListener('click', () => {
                li.remove();
                if (todoList.children.length === 0) {
                    todoList.innerHTML = '<div class="todo-empty">Нет задач. Добавьте новую!</div>';
                }
                saveTodos();
            });

            li.appendChild(checkbox);
            li.appendChild(span);
            li.appendChild(deleteBtn);
            todoList.appendChild(li);
        }

        function addTodo() {
            const text = todoInput.value.trim();
            if (!text) return;

            todoList.querySelectorAll('.todo-empty').forEach(el => el.remove());
            addTodoToList(text);
            saveTodos();
            todoInput.value = '';
            todoInput.focus();
        }

        addTodoBtn.addEventListener('click', addTodo);
        todoInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTodo();
        });

        // Initialize todos
        loadTodos();
        if (todoList.children.length === 0) {
            todoList.innerHTML = '<div class="todo-empty">Нет задач. Добавьте новую!</div>';
        }

        // ==================== QUOTE WIDGET ====================
        const quoteContainer = document.getElementById('quoteContainer');
        const newQuoteBtn = document.getElementById('newQuoteBtn');

        function displayQuote(quote) {
            quoteContainer.innerHTML = `
                <div class="quote-container">
                    <div class="quote-text">"${quote.content}"</div>
                    <div class="quote-author">— ${quote.author.replace(', type.essays', '').replace(', type.quote', '')}</div>
                </div>
            `;
        }

        function displayQuoteLoading() {
            quoteContainer.innerHTML = '<div class="quote-loading">Загрузка цитаты...</div>';
        }

        function displayQuoteError() {
            quoteContainer.innerHTML = '<div class="quote-error">❌ Не удалось загрузить цитату. Проверьте интернет.</div>';
        }

        async function getRandomQuote() {
            displayQuoteLoading();

            try {
                const response = await fetch('https://api.quotable.io/random?maxLength=200');
                if (!response.ok) throw new Error('Failed to fetch');

                const quote = await response.json();
                displayQuote(quote);
            } catch (error) {
                displayQuoteError();
            }
        }

        newQuoteBtn.addEventListener('click', getRandomQuote);

        // Load initial quote
        getRandomQuote();

        // ==================== INITIALIZATION ====================
        initTheme();
    </script>
</body>
</html>
